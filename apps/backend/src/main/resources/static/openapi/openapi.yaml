openapi: 3.0.3
info:
  contact:
    email: excited600@gmail.com
    name: developer - xi600
  description: |
    3040 서비스의 API 명세서입니다.
  title: 3040 API
  version: 1.0.0
servers:
- description: 로컬 서버
  url: http://localhost:8080
tags:
- description: 모임
  name: Gatherings
- description: 사용자
  name: Users
paths:
  /gatherings:
    get:
      operationId: scrollFilteredGatherings
      parameters:
      - description: Cursor for the page. Omit for the first page.
        explode: true
        in: query
        name: uuid
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: Score of gatherings. Omit for the first page.
        explode: true
        in: query
        name: score
        required: false
        schema:
          type: integer
        style: form
      - description: Number of gatherings to retrieve per page
        explode: true
        in: query
        name: size
        required: true
        schema:
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Filter gatherings by statuses
        explode: true
        in: query
        name: statuses
        required: false
        schema:
          items:
            $ref: "#/components/schemas/Gathering_Status"
          type: array
        style: form
      - description: Filter gatherings by categories
        explode: true
        in: query
        name: categories
        required: false
        schema:
          items:
            $ref: "#/components/schemas/Gathering_Category"
          type: array
        style: form
      - description: Filter gatherings by current guest count
        explode: true
        in: query
        name: guestCount
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by day of week
        explode: true
        in: query
        name: dayOfWeek
        required: false
        schema:
          $ref: "#/components/schemas/Gathering_DayOfWeek"
        style: form
      - description: Filter gatherings that start on or after this date
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: Filter gatherings that end on or before this date
        explode: true
        in: query
        name: endDate
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: Filter gatherings by location
        explode: true
        in: query
        name: location
        required: false
        schema:
          type: string
        style: form
      - description: Filter gatherings by minimum age
        explode: true
        in: query
        name: startAge
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by maximum age
        explode: true
        in: query
        name: endAge
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by whether gender ratio is enabled
        explode: true
        in: query
        name: genderRatioEnabled
        required: false
        schema:
          type: boolean
        style: form
      - description: Filter gatherings by minimum capacity
        explode: true
        in: query
        name: minCapacity
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by maximum capacity
        explode: true
        in: query
        name: maxCapacity
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by minimum fee
        explode: true
        in: query
        name: minFee
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by maximum fee
        explode: true
        in: query
        name: maxFee
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrollFilteredGatheringsResponse"
          description: Gatherings retrieved successfully
      summary: Scroll filtered gatherings with cursor-based pagination
      tags:
      - Gatherings
    post:
      operationId: openGathering
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenGatheringRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenGatheringResponse"
          description: Gathering open successfully
      summary: Open a new gathering
      tags:
      - Gatherings
  /series:
    post:
      operationId: scheduleSeries
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleSeriesRequest"
        required: true
      responses:
        "201":
          description: Gatherings scheduled successfully
      summary: Schedule gatherings based on host setting
      tags:
      - Gatherings
  /gatherings/{gatheringUuid}/join:
    post:
      operationId: joinGathering
      parameters:
      - description: The UUID of the gathering to join
        explode: false
        in: path
        name: gatheringUuid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinGatheringRequest"
        required: true
      responses:
        "201":
          description: Joined gathering successfully
      summary: Join the gathering as a guest
      tags:
      - Gatherings
  /gatherings/{gatheringUuid}/leave:
    post:
      operationId: leaveGathering
      parameters:
      - description: The UUID of the gathering to leave
        explode: false
        in: path
        name: gatheringUuid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/leaveGathering_request"
        required: true
      responses:
        "204":
          description: Left gathering successfully
      summary: Leave a gathering as a guest
      tags:
      - Gatherings
  /payments/{paymentId}/prepare:
    post:
      operationId: preparePayment
      parameters:
      - description: Unique identifier for the payment
        explode: false
        in: path
        name: paymentId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreparePaymentRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparePaymentResponse"
          description: Payment prepared successfully
      summary: Prepare a payment for a gathering
      tags:
      - Payments
  /payments/webhook:
    post:
      operationId: paymentWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhook"
        required: true
      responses:
        "200":
          description: Webhook handled successfully
      summary: Payment gateway webhook to handle payment notifications
      tags:
      - Payments
components:
