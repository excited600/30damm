openapi: 3.0.3
info:
  contact:
    email: excited600@gmail.com
    name: developer - xi600
  description: |
    30damm 서비스의 API 명세서입니다.
  title: 30damm API
  version: 1.0.0
servers:
- description: 로컬 서버
  url: http://localhost:8080
tags:
- description: 모임
  name: Gatherings
- description: 사용자
  name: Users
paths:
  /api/v1/users/signup:
    post:
      operationId: signup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
          description: 회원가입 성공
        "400":
          description: 유효성 검사 실패
        "409":
          description: 이메일 중복
      summary: 이메일 회원가입
      tags:
      - Users
  /api/v1/users/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: 로그인 성공
        "400":
          description: 유효성 검사 실패
        "401":
          description: 이메일 또는 비밀번호 불일치
      summary: 로그인
      tags:
      - Users
  /api/v1/gatherings:
    get:
      operationId: scrollFilteredGatherings
      parameters:
      - description: Cursor for the page. Omit for the first page.
        explode: true
        in: query
        name: uuid
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: Score of gatherings. Omit for the first page.
        explode: true
        in: query
        name: score
        required: false
        schema:
          type: integer
        style: form
      - description: Number of gatherings to retrieve per page
        explode: true
        in: query
        name: size
        required: true
        schema:
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Filter gatherings by statuses
        explode: true
        in: query
        name: statuses
        required: false
        schema:
          items:
            $ref: "#/components/schemas/Gathering_Status"
          type: array
        style: form
      - description: Filter gatherings by categories
        explode: true
        in: query
        name: categories
        required: false
        schema:
          items:
            $ref: "#/components/schemas/Gathering_Category"
          type: array
        style: form
      - description: Filter gatherings by current guest count
        explode: true
        in: query
        name: guestCount
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by day of week
        explode: true
        in: query
        name: dayOfWeek
        required: false
        schema:
          $ref: "#/components/schemas/Gathering_DayOfWeek"
        style: form
      - description: Filter gatherings that start on or after this date
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: Filter gatherings that end on or before this date
        explode: true
        in: query
        name: endDate
        required: false
        schema:
          format: date
          type: string
        style: form
      - description: Filter gatherings by location
        explode: true
        in: query
        name: location
        required: false
        schema:
          type: string
        style: form
      - description: Filter gatherings by minimum age
        explode: true
        in: query
        name: startAge
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by maximum age
        explode: true
        in: query
        name: endAge
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by whether gender ratio is enabled
        explode: true
        in: query
        name: genderRatioEnabled
        required: false
        schema:
          type: boolean
        style: form
      - description: Filter gatherings by minimum capacity
        explode: true
        in: query
        name: minCapacity
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by maximum capacity
        explode: true
        in: query
        name: maxCapacity
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by minimum fee
        explode: true
        in: query
        name: minFee
        required: false
        schema:
          type: integer
        style: form
      - description: Filter gatherings by maximum fee
        explode: true
        in: query
        name: maxFee
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrollFilteredGatheringsResponse"
          description: 모임 목록 조회 성공
        "400":
          description: 유효성 검사 실패
        "401":
          description: 미인증
      security:
      - BearerAuth: []
      summary: 모임 목록 조회 (커서 기반 페이지네이션)
      tags:
      - Gatherings
    post:
      operationId: openGathering
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenGatheringRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenGatheringResponse"
          description: 모임 생성 성공
        "400":
          description: 유효성 검사 실패
        "401":
          description: 미인증
      security:
      - BearerAuth: []
      summary: 모임 생성
      tags:
      - Gatherings
  /api/v1/gatherings/{gatheringId}:
    get:
      operationId: getGatheringDetail
      parameters:
      - description: 모임 ID (UUIDv7)
        explode: false
        in: path
        name: gatheringId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGatheringDetailResponse"
          description: 모임 상세 조회 성공
        "400":
          description: 유효성 검사 실패
        "401":
          description: 미인증
        "404":
          description: 모임을 찾을 수 없음
      security:
      - BearerAuth: []
      summary: 모임 상세 조회
      tags:
      - Gatherings
  /api/v1/series:
    post:
      operationId: scheduleSeries
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleSeriesRequest"
        required: true
      responses:
        "201":
          description: Gatherings scheduled successfully
        "401":
          description: 미인증
      security:
      - BearerAuth: []
      summary: Schedule gatherings based on host setting
      tags:
      - Gatherings
  /api/v1/gatherings/{gatheringUuid}/join:
    post:
      operationId: joinGathering
      parameters:
      - description: The UUID of the gathering to join
        explode: false
        in: path
        name: gatheringUuid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinGatheringRequest"
        required: true
      responses:
        "201":
          description: Joined gathering successfully
        "401":
          description: 미인증
      security:
      - BearerAuth: []
      summary: Join the gathering as a guest
      tags:
      - Gatherings
  /api/v1/gatherings/{gatheringUuid}/leave:
    post:
      operationId: leaveGathering
      parameters:
      - description: The UUID of the gathering to leave
        explode: false
        in: path
        name: gatheringUuid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/leaveGathering_request"
        required: true
      responses:
        "204":
          description: Left gathering successfully
        "401":
          description: 미인증
      security:
      - BearerAuth: []
      summary: Leave a gathering as a guest
      tags:
      - Gatherings
  /api/v1/payments/{paymentId}/prepare:
    post:
      operationId: preparePayment
      parameters:
      - description: Unique identifier for the payment
        explode: false
        in: path
        name: paymentId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreparePaymentRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreparePaymentResponse"
          description: Payment prepared successfully
      summary: Prepare a payment for a gathering
      tags:
      - Payments
  /api/v1/payments/webhook:
    post:
      operationId: paymentWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhook"
        required: true
      responses:
        "200":
          description: Webhook handled successfully
      summary: Payment gateway webhook to handle payment notifications
      tags:
      - Payments
components:
  schemas:
    SignupRequest:
      example:
        password: password
        nickname: nickname
        email: email
      properties:
        email:
          description: 유효한 이메일 주소
          format: email
          type: string
        password:
          description: 비밀번호 (8~20자)
          maxLength: 20
          minLength: 8
          type: string
        nickname:
          description: 닉네임 (2~10자)
          maxLength: 10
          minLength: 2
          type: string
      required:
      - email
      - nickname
      - password
      type: object
    SignupResponse:
      example:
        userUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        accessToken: accessToken
        refreshToken: refreshToken
      properties:
        userUuid:
          description: 사용자 UUID (UUIDv7)
          format: uuid
          type: string
        accessToken:
          description: JWT 액세스 토큰
          type: string
        refreshToken:
          description: JWT 리프레시 토큰
          type: string
      required:
      - accessToken
      - refreshToken
      - userUuid
      type: object
    LoginRequest:
      example:
        password: password
        email: email
      properties:
        email:
          description: 이메일 주소
          format: email
          type: string
        password:
          description: 비밀번호
          type: string
      required:
      - email
      - password
      type: object
    LoginResponse:
      example:
        userUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        accessToken: accessToken
        refreshToken: refreshToken
      properties:
        userUuid:
          description: 사용자 UUID (UUIDv7)
          format: uuid
          type: string
        accessToken:
          description: JWT 액세스 토큰
          type: string
        refreshToken:
          description: JWT 리프레시 토큰
          type: string
      required:
      - accessToken
      - refreshToken
      - userUuid
      type: object
    OpenGatheringRequest:
      example:
        date: 2000-01-23
        isSplit: true
        description: description
        maxCapacity: 1
        maxMaleCapacity: 5
        title: title
        duration: 30
        isGenderRatioEnabled: true
        isFree: true
        maxFemaleCapacity: 5
        price: 2
        location: location
        startTime: 19:00
        minCapacity: 2
        category: NONE
      properties:
        title:
          description: 모임 제목 (최대 20자)
          maxLength: 20
          type: string
        description:
          description: 모임 설명 (최대 200자)
          maxLength: 200
          type: string
        category:
          $ref: "#/components/schemas/Gathering_Category"
        location:
          description: 장소
          nullable: true
          type: string
        date:
          description: 날짜 (미래 날짜만 가능)
          format: date
          nullable: true
          type: string
        startTime:
          description: "시작 시간 (HH:mm, 24시간제)"
          example: 19:00
          nullable: true
          type: string
        duration:
          description: "소요 시간 (분 단위, 최소 30분)"
          minimum: 30
          nullable: true
          type: integer
        minCapacity:
          description: 최소 인원 (최소 2명)
          minimum: 2
          type: integer
        maxCapacity:
          description: 최대 인원 (minCapacity 이상)
          type: integer
        isGenderRatioEnabled:
          description: 성비 제한 활성화 여부
          type: boolean
        maxMaleCapacity:
          description: 최대 남성 인원 (isGenderRatioEnabled=true일 때만)
          nullable: true
          type: integer
        maxFemaleCapacity:
          description: 최대 여성 인원 (isGenderRatioEnabled=true일 때만)
          nullable: true
          type: integer
        isFree:
          description: 무료 여부
          type: boolean
        price:
          description: "가격 (원 단위, isFree=false일 때 필수)"
          nullable: true
          type: integer
        isSplit:
          description: 더치페이 여부
          type: boolean
      required:
      - category
      - description
      - isFree
      - isGenderRatioEnabled
      - isSplit
      - maxCapacity
      - minCapacity
      - title
      type: object
    OpenGatheringResponse:
      example:
        gatheringUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        gatheringUuid:
          description: 생성된 모임 UUID (UUIDv7)
          format: uuid
          type: string
      required:
      - gatheringUuid
      type: object
    ScheduleSeriesRequest:
      discriminator:
        mapping:
          WEEKLY: "#/components/schemas/WeeklyScheduleSeriesRequest"
          DATE: "#/components/schemas/DateScheduleSeriesRequest"
        propertyName: scheduleType
      example:
        maxMaleCount: 1
        approveType: FIRST_IN
        subCategory: HOME_PARTY
        fee: 7
        maxCapacity: 6
        title: title
        gatheringDays: 9
        discountEnabled: true
        maxFemaleCount: 5
        offline: true
        genderRatioEnabled: true
        scheduleType: WEEKLY
        hostUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        maxAge: 2
        minAge: 5
        imageUrl: imageUrl
        minCapacity: 0
        place: place
        category: NONE
        introduction: introduction
      properties:
        scheduleType:
          $ref: "#/components/schemas/Gathering_ScheduleType"
        hostUuid:
          description: UUID of the host. tmp property
          format: uuid
          type: string
        approveType:
          $ref: "#/components/schemas/Gathering_ApproveType"
        minCapacity:
          description: Minimum capacity of the gathering
          type: integer
        maxCapacity:
          description: Maximum capacity of the gathering
          type: integer
        maxMaleCount:
          description: Maximum number of male guests
          type: integer
        maxFemaleCount:
          description: Maximum number of female guests
          type: integer
        genderRatioEnabled:
          description: If host can set gender ratio for the gathering
          type: boolean
        minAge:
          description: Minimum age of guests
          type: integer
        maxAge:
          description: Maximum age of guests
          type: integer
        fee:
          description: Fee to join the gathering
          type: integer
        discountEnabled:
          description: If host can set discount strategy for the gathering
          type: boolean
        offline:
          description: If the gathering is offline
          type: boolean
        place:
          description: Place where the gathering will be held
          type: string
        category:
          $ref: "#/components/schemas/Gathering_Category"
        subCategory:
          $ref: "#/components/schemas/Gathering_SubCategory"
        imageUrl:
          description: URL of the gathering image
          type: string
        title:
          description: Title of the gathering
          type: string
        introduction:
          description: Introduction of the gathering
          type: string
        gatheringDays:
          description: Number of days before the gathering will take place.
          type: integer
      required:
      - approveType
      - category
      - discountEnabled
      - fee
      - gatheringDays
      - genderRatioEnabled
      - hostUuid
      - imageUrl
      - introduction
      - maxAge
      - maxCapacity
      - minAge
      - minCapacity
      - offline
      - place
      - scheduleType
      - subCategory
      - title
      type: object
    WeeklyScheduleSeriesRequest:
      allOf:
      - $ref: "#/components/schemas/ScheduleSeriesRequest"
      - properties:
          startDate:
            description: Start date for this day of week schedule
            format: date
            type: string
          endDate:
            description: End date for this day of week schedule
            format: date
            type: string
          summaries:
            description: List of Schedule summaries for this day of week schedule
            items:
              $ref: "#/components/schemas/Gathering_WeeklyScheduleSummary"
            type: array
        required:
        - endDate
        - startDate
        - summaries
        type: object
    DateScheduleSeriesRequest:
      allOf:
      - $ref: "#/components/schemas/ScheduleSeriesRequest"
      - properties:
          summaries:
            description: List of Date Schedule summaries
            items:
              $ref: "#/components/schemas/Gathering_DateScheduleSummary"
            type: array
        required:
        - summaries
        type: object
    Gathering:
      properties:
        uuid:
          description: UUID of the gathering
          format: uuid
          type: string
        hostUuid:
          description: UUID of the host. tmp property
          format: uuid
          type: string
        approveType:
          $ref: "#/components/schemas/Gathering_ApproveType"
        minCapacity:
          description: Minimum capacity of the gathering
          type: integer
        maxCapacity:
          description: Maximum capacity of the gathering
          type: integer
        genderRatioEnabled:
          description: If host can set gender ratio for the gathering
          type: boolean
        minAge:
          description: Minimum age of guests
          type: integer
        maxAge:
          description: Maximum age of guests
          type: integer
        maxMaleCount:
          description: Maximum number of male guests
          type: integer
        maxFemaleCount:
          description: Maximum number of female guests
          type: integer
        totalGuests:
          description: Total number of guests
          type: integer
        fee:
          description: Fee to join the gathering
          type: integer
        discountEnabled:
          description: If host can set discount strategy for the gathering
          type: boolean
        offline:
          description: If the gathering is offline
          type: boolean
        place:
          description: Place where the gathering will be held
          type: string
        category:
          $ref: "#/components/schemas/Gathering_Category"
        subCategory:
          $ref: "#/components/schemas/Gathering_SubCategory"
        status:
          $ref: "#/components/schemas/Gathering_Status"
        imageUrl:
          description: URL of the gathering image
          type: string
        title:
          description: Title of the gathering
          type: string
        introduction:
          description: Introduction of the gathering
          type: string
        clickCount:
          description: Number of clicks on the gathering
          type: integer
        startDateTime:
          description: Start date and time of the gathering
          format: date-time
          type: string
        duration:
          description: Duration of the gathering in hours (can contain decimals)
          format: float
          type: number
      required:
      - approveType
      - category
      - clickCount
      - discountEnabled
      - fee
      - genderRatioEnabled
      - hostUuid
      - imageUrl
      - introduction
      - maxAge
      - maxCapacity
      - minAge
      - minCapacity
      - offline
      - place
      - startDateTime
      - status
      - subCategory
      - title
      - totalGuests
      - uuid
      type: object
    ScrollFilteredGatheringsResponse:
      example:
        cursor:
          score: 0
          uuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        hasNext: true
        list:
        - date: 2000-01-23
          isSplit: true
          title: title
          femaleCount: 5
          imgUrl: https://openapi-generator.tech
          duration: 6
          isFree: true
          maleCount: 1
          price: 5
          host:
            gender: MALE
            userUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
            nickname: nickname
            profileImageUrl: https://openapi-generator.tech
          gatheringUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          location: location
          startTime: 19:00
        - date: 2000-01-23
          isSplit: true
          title: title
          femaleCount: 5
          imgUrl: https://openapi-generator.tech
          duration: 6
          isFree: true
          maleCount: 1
          price: 5
          host:
            gender: MALE
            userUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
            nickname: nickname
            profileImageUrl: https://openapi-generator.tech
          gatheringUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          location: location
          startTime: 19:00
      properties:
        cursor:
          $ref: "#/components/schemas/ScrollFilteredGatheringsResponse_cursor"
        hasNext:
          type: boolean
        list:
          items:
            $ref: "#/components/schemas/ScrollFilteredGatheringsResponse_list_inner"
          type: array
      required:
      - hasNext
      - list
      type: object
    GetGatheringDetailResponse:
      example:
        date: 2000-01-23
        isSplit: true
        description: description
        maxCapacity: 6
        maxMaleCapacity: 1
        title: title
        imgUrl: https://openapi-generator.tech
        duration: 7
        isHost: true
        isGenderRatioEnabled: true
        currentFemaleCount: 2
        isFree: true
        maxFemaleCapacity: 5
        price: 9
        host:
          gender: MALE
          userUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          nickname: nickname
          profileImageUrl: https://openapi-generator.tech
        guests:
        - gender: MALE
          userUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          nickname: nickname
          profileImageUrl: https://openapi-generator.tech
        - gender: MALE
          userUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          nickname: nickname
          profileImageUrl: https://openapi-generator.tech
        gatheringUuid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        minCapacity: 0
        startTime: 19:00
        location: location
        category: NONE
        currentMaleCount: 5
      properties:
        gatheringUuid:
          description: 모임 UUID (UUIDv7)
          format: uuid
          type: string
        imgUrl:
          description: 대표 이미지 URL
          format: uri
          nullable: true
          type: string
        title:
          description: 모임 제목
          type: string
        description:
          description: 모임 설명
          type: string
        host:
          $ref: "#/components/schemas/ScrollFilteredGatheringsResponse_list_inner_host"
        guests:
          description: 참여 게스트 목록 (빈 배열 가능)
          items:
            $ref: "#/components/schemas/GetGatheringDetailResponse_guests_inner"
          type: array
        category:
          $ref: "#/components/schemas/Gathering_Category"
        minCapacity:
          description: 최소 인원
          type: integer
        maxCapacity:
          description: 최대 인원
          type: integer
        isGenderRatioEnabled:
          description: 성비 제한 활성화 여부
          type: boolean
