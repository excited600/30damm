      type: object
    PreparePaymentResponse:
      example:
        channelKey: channelKey
        paymentId: paymentId
        storeId: storeId
      properties:
        paymentId:
          description: Unique identifier for the payment. It is generated by front
            app.
          type: string
        storeId:
          description: Identifier for the store where the payment is being processed.
          type: string
        channelKey:
          description: Key representing the payment channel used.
          type: string
      required:
      - channelKey
      - paymentId
      - storeId
      type: object
    PaymentWebhook:
      example:
        data:
          paymentId: paymentId
          storeId: storeId
          cancellationId: cancellationId
          transactionId: transactionId
        type: Transaction.Ready
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        type:
          $ref: "#/components/schemas/WebhookType"
        timestamp:
          description: Unix timestamp when the webhook event was generated
          format: date-time
          type: string
        data:
          $ref: "#/components/schemas/WebhookData"
      required:
      - data
      - timestamp
      - type
      type: object
    Gathering_Status:
      description: Status of the gathering
      enum:
      - OPEN_PENDING
      - OPEN
      - CLOSED
      - IN_PROGRESS
      - FINISHED
      type: string
    Gathering_Category:
      description: Category of the gathering
      enum:
      - PARTY
      - FOOD_DRINK
      - STUDY
      - INVEST
      - LANGUAGE
      - ACTIVITY
      - CULTURE
      - LOVE
      type: string
    Gathering_DayOfWeek:
      description: Day of the week
      enum:
      - SUNDAY
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
      type: string
    Gathering_ApproveType:
      description: Ways how to approve guests to join the gathering
      enum:
      - FIRST_IN
      - APPROVAL
      type: string
    Gathering_SubCategory:
      description: Sub-category of the gathering
      enum:
      - HOME_PARTY
      type: string
    Gathering_WeeklyScheduleSummary:
      properties:
        startDayOfWeek:
          $ref: "#/components/schemas/Gathering_DayOfWeek"
        startTime:
          description: Start time of the gathering on the specified day of week
          format: time
          type: string
        duration:
          description: Duration in hours (can contain decimals)
          format: float
