    ScrollFilteredGatheringsResponse:
      allOf:
      - $ref: "#/components/schemas/ScrollPage"
      - properties:
          gatherings:
            description: List of gatherings
            items:
              $ref: "#/components/schemas/Gathering"
            type: array
        required:
