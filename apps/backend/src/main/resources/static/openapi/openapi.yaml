    Gathering_Category:
      description: Category of the gathering
      enum:
      - PARTY
      - FOOD_DRINK
      - STUDY
      - INVEST
      - LANGUAGE
      - ACTIVITY
      - CULTURE
      - LOVE
      type: string
    Gathering_DayOfWeek:
      description: Day of the week
      enum:
      - SUNDAY
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
      type: string
    ScrollPage:
      properties:
        cursor:
          description: Cursor for the next page
          nullable: true
          type: string
        hasNext:
          description: Indicates if there is a next page
          type: boolean
      required:
      - hasNext
      type: object
    Gathering_ApproveType:
      description: Ways how to approve guests to join the gathering
      enum:
      - FIRST_IN
      - APPROVAL
      type: string
    Gathering_SubCategory:
      description: Sub-category of the gathering
      enum:
      - HOME_PARTY
      type: string
    Gathering_Status:
      description: Status of the gathering
      enum:
      - OPEN_PENDING
      - OPEN
      - CLOSED
      - IN_PROGRESS
      - FINISHED
      type: string
    Gathering_WeeklyScheduleSummary:
      properties:
        startDayOfWeek:
          $ref: "#/components/schemas/Gathering_DayOfWeek"
        startTime:
          description: Start time of the gathering on the specified day of week
          format: time
          type: string
        duration:
          description: Duration in hours (can contain decimals)
          format: float
          type: number
      required:
      - startDayOfWeek
      - startTime
      type: object
    Gathering_DateScheduleSummary:
      properties:
        startDate:
          description: Start date of the gathering
          format: date
          type: string
        startTime:
          description: Start time of the gathering on the specified date
          format: time
          type: string
        duration:
          description: Duration in hours (can contain decimals)
          format: float
          type: number
      required:
      - duration
      - startDate
      - startTime
      type: object
    Gathering_ScheduleType:
      description: Type of scheduling for the gatherings
      enum:
      - WEEKLY
      - DATE
      type: string
    joinGathering_request:
      properties:
        userUuid:
          description: UUID of the user who wants to join the gathering
          format: uuid
          type: string
      required:
      - userUuid
      type: object
