OpenGatheringRequest:
  type: object
  required:
    - title
    - description
    - category
    - minCapacity
    - maxCapacity
    - isGenderRatioEnabled
    - isFree
    - isSplit
  properties:
    title:
      type: string
      maxLength: 20
      description: 모임 제목 (최대 20자)
    description:
      type: string
      maxLength: 200
      description: 모임 설명 (최대 200자)
    category:
      $ref: '../../shared.yml#/Gathering_Category'
    location:
      type: string
      nullable: true
      description: 장소
    date:
      type: string
      format: date
      nullable: true
      description: 날짜 (미래 날짜만 가능)
    startTime:
      type: string
      nullable: true
      description: 시작 시간 (HH:mm, 24시간제)
      example: "19:00"
    duration:
      type: integer
      nullable: true
      minimum: 30
      description: 소요 시간 (분 단위, 최소 30분)
    minCapacity:
      type: integer
      minimum: 2
      description: 최소 인원 (최소 2명)
    maxCapacity:
      type: integer
      description: 최대 인원 (minCapacity 이상)
    isGenderRatioEnabled:
      type: boolean
      description: 성비 제한 활성화 여부
    maxMaleCapacity:
      type: integer
      nullable: true
      description: 최대 남성 인원 (isGenderRatioEnabled=true일 때만)
    maxFemaleCapacity:
      type: integer
      nullable: true
      description: 최대 여성 인원 (isGenderRatioEnabled=true일 때만)
    isFree:
      type: boolean
      description: 무료 여부
    price:
      type: integer
      nullable: true
      description: 가격 (원 단위, isFree=false일 때 필수)
    isSplit:
      type: boolean
      description: 더치페이 여부
