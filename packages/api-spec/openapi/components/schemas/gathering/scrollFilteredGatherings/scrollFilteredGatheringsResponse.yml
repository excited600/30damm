ScrollFilteredGatheringsResponse:
  type: object
  required:
    - hasNext
    - gatherings
    - cursor
  properties:
    cursor:
      type: object
      properties:
        score:
          type: integer
        uuid:
          type: string
          format: uuid
    hasNext:
      type: boolean
    gatherings:
      type: array
      items:
        $ref: '../gathering.yml#/Gathering'