ScrollFilteredGatheringsRequest:
  type: object
  required:
    - size
  properties:
    cursor:
      type: string
      nullable: true
      description: Cursor for the page. null when it is the first page.
    size:
      type: integer
      minimum: 1
      maximum: 100
      description: Number of gatherings to retrieve per page
    filter:
      $ref: '#/ScrollFilteredGatheringsFilter'




ScrollFilteredGatheringsFilter:
  type: object
  properties:
    categories:
      type: array
      description: Filter gatherings by categories
      items:
        $ref: '../../shared.yml#/Gathering_Category'
    guestCount:
      type: integer
      description: Filter gatherings by current guest count
    dayOfWeek:
      $ref: '../../shared.yml#/Gathering_DayOfWeek'
    startDate:
      type: string
      format: date
      description: Filter gatherings that start on or after this date
    endDate:
      type: string
      format: date
      description: Filter gatherings that end on or before this date
    location:
      type: string
      description: Filter gatherings by location
    startAge:
      type: integer
      description: Filter gatherings by minimum age of guests
    endAge:
      type: integer
      description: Filter gatherings by maximum age of guests
    genderRatioEnabled:
      type: boolean
      description: Filter gatherings by whether gender ratio is enabled
    minCapacity:
      type: integer
      description: Filter gatherings by minimum capacity
    maxCapacity:
      type: integer
      description: Filter gatherings by maximum capacity
    minFee:
      type: integer
      description: Filter gatherings by minimum fee
    maxFee:
      type: integer
      description: Filter gatherings by maximum fee

