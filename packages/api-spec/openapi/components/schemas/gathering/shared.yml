Gathering_ApproveType:
  type: string
  enum:
    - FIRST_IN
    - APPROVAL
  description: Ways how to approve guests to join the gathering

Gathering_Category:
  type: string
  enum:
    - PARTY
    - FOOD_DRINK
    - STUDY
    - INVEST
    - LANGUAGE
    - ACTIVITY
    - CULTURE
    - LOVE
  description: Category of the gathering

Gathering_SubCategory:
  type: string
  enum:
    - HOME_PARTY
  description: Sub-category of the gathering

Gathering_Status:
  type: string
  enum:
    - OPEN
    - CLOSED
    - IN_PROGRESS
    - COMPLETED
  description: Status of the gathering

Gathering_DayOfWeek:
  type: string
  enum:
    - SUNDAY
    - MONDAY
    - TUESDAY
    - WEDNESDAY
    - THURSDAY
    - FRIDAY
    - SATURDAY
  description: Day of the week

Gathering_ScheduleType:
  type: string
  enum:
    - WEEKLY
    - DATE
  description: Type of scheduling for the gatherings

Series_ScheduleType:
  type: string
  enum: [WEEKLY, DATE]

