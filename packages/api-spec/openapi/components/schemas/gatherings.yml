  required:
    - uuid
    - hostUuid
    - approveType
    - minCapacity
    - maxCapacity
    - genderRatioEnabled
    - minAge
    - maxAge
    - totalGuests
    - fee
    - discountEnabled
    - offline
    - place
    - category
    - subCategory
    - status
    - imageUrl
    - title
    - introduction
    - clickCount
    - startDateTime
  properties:
    uuid:
      type: string
      format: uuid
      description: UUID of the gathering
    hostUuid:
      type: string
      format: uuid
      description: UUID of the host. tmp property
    approveType:
      $ref: '#/Gathering_ApproveType'
    minCapacity:
      type: integer
      description: Minimum capacity of the gathering
    maxCapacity:
      type: integer
      description: Maximum capacity of the gathering
    genderRatioEnabled:
      type: boolean
      description: If host can set gender ratio for the gathering
    minAge:
      type: integer
      description: Minimum age of guests
    maxAge:
      type: integer
      description: Maximum age of guests
    maxMaleCount:
      type: integer
      description: Maximum number of male guests
    maxFemaleCount:
      type: integer
      description: Maximum number of female guests
    totalGuests:
      type: integer
      description: Total number of guests
    fee:
      type: integer
      description: Fee to join the gathering
    discountEnabled:
      type: boolean
      description: If host can set discount strategy for the gathering
    offline:
      type: boolean
      description: If the gathering is offline
    place:
      type: string
      description: Place where the gathering will be held
    category:
      $ref: '#/Gathering_Category'
    subCategory:
      $ref: '#/Gathering_SubCategory'
    status:
      $ref: '#/Gathering_Status'
    imageUrl:
      type: string
      description: URL of the gathering image
    title:
      type: string
      description: Title of the gathering
    introduction:
      type: string
      description: Introduction of the gathering
    clickCount:
      type: integer
      description: Number of clicks on the gathering
    startDateTime:
      type: string
      format: date-time
      description: Start date and time of the gathering
    duration:
      type: number
      format: float
      description: Duration of the gathering in hours (can contain decimals)

Gathering_ApproveType:
  type: string
  enum:
    - FIRST_IN
    - APPROVAL
  description: Ways how to approve guests to join the gathering

Gathering_Category:
  type: string
  enum:
    - PARTY
    - FOOD_DRINK
    - STUDY
    - INVEST
    - LANGUAGE
    - ACTIVITY
    - CULTURE
    - LOVE
  description: Category of the gathering

Gathering_SubCategory:
  type: string
  enum:
    - HOME_PARTY
  description: Sub-category of the gathering

Gathering_Status:
  type: string
  enum:
    - OPEN
    - CLOSED
    - IN_PROGRESS
    - COMPLETED
  description: Status of the gathering

Gathering_DayOfWeek:
  type: string
  enum:
    - SUNDAY
    - MONDAY
    - TUESDAY
    - WEDNESDAY
    - THURSDAY
    - FRIDAY
    - SATURDAY
  description: Day of the week

Gathering_ScheduleType:
  type: string
  enum:
    - WEEKLY
    - DATE
  description: Type of scheduling for the gatherings

Gathering_WeeklySchedule:
  type: object
  required:
    - startDate
    - endDate
    - summaries
  properties:
    startDate:
      type: string
      format: date
      description: Start date for this day of week schedule
    endDate:
      type: string
      format: date
      description: End date for this day of week schedule
    summaries:
      type: array
      description: List of Schedule summaries for this day of week schedule
      items:
        $ref: '#/Gathering_WeeklyScheduleSummary'


Gathering_WeeklyScheduleSummary:
  type: object
  required:
    - dayOfWeek
    - startTime
    - duration
  properties:
    dayOfWeek:
      $ref: '#/Gathering_DayOfWeek'
    startTime:
      type: string
      format: time
      description: Start time of the gathering on the specified day of week
    duration:
      type: number
      format: float
      description: Duration in hours (can contain decimals)

Gathering_DateSchedule:
  type: object
  required:
    - summaries
  properties:
    summaries:
      type: array
      description: List of Date Schedule summaries
      items:
        $ref: '#/Gathering_DateScheduleSummary'

Gathering_DateScheduleSummary:
  type: object
  required:
    - date
    - startTime
    - duration
  properties:
    date:
      type: string
      format: date
      description: Date of the gathering
    startTime:
      type: string
      format: time
      description: Start time of the gathering on the specified date
    duration:
      type: number
      format: float
      description: Duration in hours (can contain decimals)