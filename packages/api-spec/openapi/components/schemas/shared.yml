Gathering_ApproveType:
  type: string
  enum:
    - FIRST_IN
    - APPROVAL
  description: Ways how to approve guests to join the gathering

Gathering_Category:
  type: string
  enum:
    - NONE
    - PARTY
    - FOOD_DRINK
    - ACTIVITY
  description: Category of the gathering

Gender:
  type: string
  enum:
    - MALE
    - FEMALE
  description: Gender of the user

Gathering_SubCategory:
  type: string
  enum:
    - HOME_PARTY
  description: Sub-category of the gathering

Gathering_Status:
  type: string
  enum:
    - OPEN_PENDING
    - OPEN
    - CLOSED
    - IN_PROGRESS
    - FINISHED
  description: Status of the gathering

Gathering_DayOfWeek:
  type: string
  enum:
    - SUNDAY
    - MONDAY
    - TUESDAY
    - WEDNESDAY
    - THURSDAY
    - FRIDAY
    - SATURDAY
  description: Day of the week

ProductType:
  type: string
  enum:
    - GATHERING
  description: Type of the product

Gathering_ScheduleType:
  type: string
  enum:
    - WEEKLY
    - DATE
  description: Type of scheduling for the gatherings

Series_ScheduleType:
  type: string
  enum: [WEEKLY, DATE]