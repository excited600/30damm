PreparePaymentResponse:
  type: object
  required:
    - paymentId
    - storeId
    - channelKey
  properties:
    paymentId:
      type: string
      description: Unique identifier for the payment. It is generated by front app.
    storeId:
      type: string
      description: Identifier for the store where the payment is being processed.
    channelKey:
      type: string
      description: Key representing the payment channel used.
