/payments/{paymentId}/prepare:
  post:
    operationId: preparePayment
    tags:
      - Payments
    summary: Prepare a payment for a gathering
    parameters:
      - name: paymentId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier for the payment
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/payment/preparePayment/preparePaymentRequest.yml#/PreparePaymentRequest'
    responses:
      '200':
        description: Payment prepared successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/payment/preparePayment/preparePaymentResponse.yml#/PreparePaymentResponse'

/payments/webhook:
  post:
    operationId: paymentWebhook
    tags:
      - Payments
    summary: Payment gateway webhook to handle payment notifications
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/payment/webhook/paymentWebhook.yml#/PaymentWebhook'
    responses:
      '200':
        description: Webhook handled successfully