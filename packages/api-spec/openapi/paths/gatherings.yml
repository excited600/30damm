/gatherings/{gatheringId}:
  get:
    operationId: getGatheringDetail
    tags:
      - Gatherings
    summary: 모임 상세 조회
    security:
      - BearerAuth: []
    parameters:
      - name: gatheringId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: 모임 ID (UUIDv7)
    responses:
      '200':
        description: 모임 상세 조회 성공
        content:
          application/json:
            schema:
              $ref: '../components/schemas/gathering/getGatheringDetail/getGatheringDetailResponse.yml#/GetGatheringDetailResponse'
      '400':
        description: 유효성 검사 실패
      '401':
        description: 미인증
      '404':
        description: 모임을 찾을 수 없음

/gatherings/{gatheringUuid}/join:
  post:
    operationId: joinGathering
    tags:
      - Gatherings
    summary: Join the gathering as a guest
    security:
      - BearerAuth: []
    parameters:
      - name: gatheringUuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The UUID of the gathering to join
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../30damm-api-spec-overview.yml#/components/schemas/JoinGatheringRequest'
    responses:
      '201':
        description: Joined gathering successfully
      '401':
        description: 미인증

/gatherings:
  get:
    operationId: scrollFilteredGatherings
    tags:
      - Gatherings
    summary: 모임 목록 조회 (커서 기반 페이지네이션)
    security:
      - BearerAuth: []
    parameters:
      - name: uuid
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Cursor for the page. Omit for the first page.
      - name: score
        in: query
        required: false
        schema:
          type: integer
        description: Score of gatherings. Omit for the first page.
      - name: size
        in: query
        required: true
        schema:
          type: integer
          minimum: 1
          maximum: 100
        description: Number of gatherings to retrieve per page
      - name: statuses
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '../components/schemas/shared.yml#/Gathering_Status'
        description: Filter gatherings by statuses
      - name: categories
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '../components/schemas/shared.yml#/Gathering_Category'
        description: Filter gatherings by categories
      - name: guestCount
        in: query
        required: false
        schema:
          type: integer
        description: Filter gatherings by current guest count
      - name: dayOfWeek
        in: query
        required: false
        schema:
          $ref: '../components/schemas/shared.yml#/Gathering_DayOfWeek'
        description: Filter gatherings by day of week
      - name: startDate
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Filter gatherings that start on or after this date
      - name: endDate
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Filter gatherings that end on or before this date
      - name: location
        in: query
        required: false
        schema:
          type: string
        description: Filter gatherings by location
      - name: startAge
        in: query
        required: false
        schema:
          type: integer
        description: Filter gatherings by minimum age
      - name: endAge
        in: query
        required: false
        schema:
          type: integer
        description: Filter gatherings by maximum age
      - name: genderRatioEnabled
        in: query
        required: false
        schema:
          type: boolean
        description: Filter gatherings by whether gender ratio is enabled
      - name: minCapacity
        in: query
        required: false
        schema:
          type: integer
        description: Filter gatherings by minimum capacity
      - name: maxCapacity
        in: query
        required: false
        schema:
          type: integer
        description: Filter gatherings by maximum capacity
      - name: minFee
        in: query
        required: false
        schema:
          type: integer
        description: Filter gatherings by minimum fee
      - name: maxFee
        in: query
        required: false
        schema:
          type: integer
        description: Filter gatherings by maximum fee
    responses:
      '200':
        description: 모임 목록 조회 성공
        content:
          application/json:
            schema:
              $ref: '../components/schemas/gathering/scrollFilteredGatherings/scrollFilteredGatheringsResponse.yml#/ScrollFilteredGatheringsResponse'
      '400':
        description: 유효성 검사 실패
      '401':
        description: 미인증
  post:
    operationId: openGathering
    tags:
      - Gatherings
    summary: 모임 생성
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../30damm-api-spec-overview.yml#/components/schemas/OpenGatheringRequest'
    responses:
      '201':
        description: 모임 생성 성공
        content:
          application/json:
            schema:
              $ref: '../30damm-api-spec-overview.yml#/components/schemas/OpenGatheringResponse'
      '400':
        description: 유효성 검사 실패
      '401':
        description: 미인증

/gatherings/{gatheringUuid}/leave:
  post:
    operationId: leaveGathering
    tags:
      - Gatherings
    summary: Leave a gathering as a guest
    security:
      - BearerAuth: []
    parameters:
      - name: gatheringUuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The UUID of the gathering to leave
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - userUuid
              - reason
            properties:
              userUuid:
                type: string
                format: uuid
                description: UUID of the user leaving the gathering
              reason:
                type: string
                description: Reason for leaving the gathering
    responses:
      '204':
        description: Left gathering successfully
      '401':
        description: 미인증

/series:
  post:
    operationId: scheduleSeries
    tags:
      - Gatherings
    summary: Schedule gatherings based on host setting
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../30damm-api-spec-overview.yml#/components/schemas/ScheduleSeriesRequest'
    responses:
      '201':
        description: Gatherings scheduled successfully
      '401':
        description: 미인증
