openapi: 3.0.3
info:
  title: 3040 API
  description: |
    3040 서비스의 API 명세서입니다.
  version: 1.0.0
  contact:
    name: developer - xi600
    email: excited600@gmail.com
servers:
  - url: http://localhost:8080
    description: 로컬 서버
tags:
  - name: Gatherings
    description: 모임
  - name: Users
    description: 사용자
paths:
  /gatherings:
    get:
      operationId: scrollFilteredGatherings
      tags:
        - Gatherings
      summary: Scroll filtered gatherings with cursor-based pagination
      parameters:
        - name: uuid
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Cursor for the page. Omit for the first page.
        - name: score
          in: query
          required: false
          schema:
            type: integer
          description: Score of gatherings. Omit for the first page.
        - name: size
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Number of gatherings to retrieve per page
        - name: statuses
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Gathering_Status'
          description: Filter gatherings by statuses
        - name: categories
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Gathering_Category'
          description: Filter gatherings by categories
        - name: guestCount
          in: query
          required: false
          schema:
            type: integer
          description: Filter gatherings by current guest count
        - name: dayOfWeek
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Gathering_DayOfWeek'
          description: Filter gatherings by day of week
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter gatherings that start on or after this date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter gatherings that end on or before this date
        - name: location
          in: query
          required: false
          schema:
            type: string
          description: Filter gatherings by location
        - name: startAge
          in: query
          required: false
          schema:
            type: integer
          description: Filter gatherings by minimum age
        - name: endAge
          in: query
          required: false
          schema:
            type: integer
          description: Filter gatherings by maximum age
        - name: genderRatioEnabled
          in: query
          required: false
          schema:
            type: boolean
          description: Filter gatherings by whether gender ratio is enabled
        - name: minCapacity
          in: query
          required: false
          schema:
            type: integer
          description: Filter gatherings by minimum capacity
        - name: maxCapacity
          in: query
          required: false
          schema:
            type: integer
          description: Filter gatherings by maximum capacity
        - name: minFee
          in: query
          required: false
          schema:
            type: integer
          description: Filter gatherings by minimum fee
        - name: maxFee
          in: query
          required: false
          schema:
            type: integer
          description: Filter gatherings by maximum fee
      responses:
        '200':
          description: Gatherings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrollFilteredGatheringsResponse'
    post:
      operationId: openGathering
      tags:
        - Gatherings
      summary: Open a new gathering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenGatheringRequest'
      responses:
        '201':
          description: Gathering open successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenGatheringResponse'
  /series:
    post:
      operationId: scheduleSeries
      tags:
        - Gatherings
      summary: Schedule gatherings based on host setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleSeriesRequest'
      responses:
        '201':
          description: Gatherings scheduled successfully
  /gatherings/{gatheringUuid}/join:
    post:
      operationId: joinGathering
      tags:
        - Gatherings
      summary: Join the gathering as a guest
      parameters:
        - name: gatheringUuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The UUID of the gathering to join
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinGatheringRequest'
      responses:
        '201':
          description: Joined gathering successfully
  /gatherings/{gatheringUuid}/leave:
    post:
      operationId: leaveGathering
      tags:
        - Gatherings
      summary: Leave a gathering as a guest
      parameters:
        - name: gatheringUuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The UUID of the gathering to leave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userUuid
                - reason
              properties:
                userUuid:
                  type: string
                  format: uuid
                  description: UUID of the user leaving the gathering
                reason:
                  type: string
                  description: Reason for leaving the gathering
      responses:
        '204':
          description: Left gathering successfully
  /payments/{paymentId}/prepare:
    post:
      operationId: preparePayment
      tags:
        - Payments
      summary: Prepare a payment for a gathering
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier for the payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreparePaymentRequest'
      responses:
        '200':
          description: Payment prepared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreparePaymentResponse'
  /payments/webhook:
    post:
      operationId: paymentWebhook
      tags:
        - Payments
      summary: Payment gateway webhook to handle payment notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhook'
      responses:
        '200':
          description: Webhook handled successfully
components:
  schemas:
    OpenGatheringRequest:
      type: object
      required:
        - hostUuid
        - approveType
        - minCapacity
        - maxCapacity
        - genderRatioEnabled
        - minAge
        - maxAge
        - fee
        - discountEnabled
        - offline
        - place
        - category
        - subCategory
        - imageUrl
        - title
        - introduction
        - startDateTime
      properties:
        hostUuid:
          type: string
          format: uuid
          description: UUID of the host. tmp property
        approveType:
          $ref: '#/components/schemas/Gathering_ApproveType'
        minCapacity:
          type: integer
          description: Minimum capacity of the gathering
        maxCapacity:
          type: integer
          description: Maximum capacity of the gathering
        maxMaleCount:
          type: integer
          description: Maximum number of male guests
        maxFemaleCount:
          type: integer
          description: Maximum number of female guests
        genderRatioEnabled:
          type: boolean
          description: If host can set gender ratio for the gathering
        minAge:
          type: integer
          description: Minimum age of guests
        maxAge:
          type: integer
          description: Maximum age of guests
        fee:
          type: integer
          description: Fee to join the gathering
        discountEnabled:
          type: boolean
          description: If host can set discount strategy for the gathering
        offline:
          type: boolean
          description: If the gathering is offline
        place:
          type: string
          description: Place where the gathering will be held
        category:
          $ref: '#/components/schemas/Gathering_Category'
        subCategory:
          $ref: '#/components/schemas/Gathering_SubCategory'
        imageUrl:
          type: string
          description: URL of the gathering image
        title:
          type: string
          description: Title of the gathering
        introduction:
          type: string
          description: Introduction of the gathering
        startDateTime:
          type: string
          format: date-time
          description: Start date and time of the gathering
        duration:
          type: number
          format: float
          description: Duration of the gathering in hours (can contain decimals)
    OpenGatheringResponse:
      type: object
      required:
        - uuid
        - hostUuid
        - approveType
        - minCapacity
        - maxCapacity
        - genderRatioEnabled
        - minAge
        - maxAge
        - totalGuests
        - fee
        - discountEnabled
        - offline
        - place
        - category
        - subCategory
        - status
        - imageUrl
        - title
        - introduction
        - clickCount
        - startDateTime
      properties:
        uuid:
          type: string
          format: uuid
          description: UUID of the gathering
        hostUuid:
          type: string
          format: uuid
          description: UUID of the host. tmp property
        approveType:
          $ref: '#/components/schemas/Gathering_ApproveType'
        minCapacity:
          type: integer
          description: Minimum capacity of the gathering
        maxCapacity:
          type: integer
          description: Maximum capacity of the gathering
        genderRatioEnabled:
          type: boolean
          description: If host can set gender ratio for the gathering
        minAge:
          type: integer
          description: Minimum age of guests
        maxAge:
          type: integer
          description: Maximum age of guests
        maxMaleCount:
          type: integer
          description: Maximum number of male guests
        maxFemaleCount:
          type: integer
          description: Maximum number of female guests
        totalGuests:
          type: integer
          description: Total number of guests
        fee:
          type: integer
          description: Fee to join the gathering
        discountEnabled:
          type: boolean
          description: If host can set discount strategy for the gathering
        offline:
          type: boolean
          description: If the gathering is offline
        place:
          type: string
          description: Place where the gathering will be held
        category:
          $ref: '#/components/schemas/Gathering_Category'
        subCategory:
          $ref: '#/components/schemas/Gathering_SubCategory'
        status:
          $ref: '#/components/schemas/Gathering_Status'
        imageUrl:
          type: string
          description: URL of the gathering image
        title:
          type: string
          description: Title of the gathering
        introduction:
          type: string
          description: Introduction of the gathering
        clickCount:
          type: integer
          description: Number of clicks on the gathering
        startDateTime:
          type: string
          format: date-time
          description: Start date and time of the gathering
        duration:
          type: number
          format: float
          description: Duration of the gathering in hours (can contain decimals)
    ScheduleSeriesRequest:
      type: object
      required:
        - scheduleType
        - hostUuid
        - approveType
        - minCapacity
        - maxCapacity
        - genderRatioEnabled
        - minAge
        - maxAge
        - discountEnabled
        - offline
        - place
        - fee
        - category
        - subCategory
        - imageUrl
        - title
        - introduction
        - gatheringDays
      properties:
        scheduleType:
          $ref: '#/components/schemas/Gathering_ScheduleType'
        hostUuid:
          type: string
          format: uuid
          description: UUID of the host. tmp property
        approveType:
          $ref: '#/components/schemas/Gathering_ApproveType'
        minCapacity:
          type: integer
          description: Minimum capacity of the gathering
        maxCapacity:
          type: integer
          description: Maximum capacity of the gathering
        maxMaleCount:
          type: integer
          description: Maximum number of male guests
        maxFemaleCount:
          type: integer
          description: Maximum number of female guests
        genderRatioEnabled:
          type: boolean
          description: If host can set gender ratio for the gathering
        minAge:
          type: integer
          description: Minimum age of guests
        maxAge:
          type: integer
          description: Maximum age of guests
        fee:
          type: integer
          description: Fee to join the gathering
        discountEnabled:
          type: boolean
          description: If host can set discount strategy for the gathering
        offline:
          type: boolean
          description: If the gathering is offline
        place:
          type: string
          description: Place where the gathering will be held
        category:
          $ref: '#/components/schemas/Gathering_Category'
        subCategory:
          $ref: '#/components/schemas/Gathering_SubCategory'
        imageUrl:
          type: string
          description: URL of the gathering image
        title:
          type: string
          description: Title of the gathering
        introduction:
          type: string
          description: Introduction of the gathering
        gatheringDays:
          type: integer
          description: Number of days before the gathering will take place.
      discriminator:
        propertyName: scheduleType
        mapping:
          WEEKLY: '#/components/schemas/WeeklyScheduleSeriesRequest'
          DATE: '#/components/schemas/DateScheduleSeriesRequest'
    WeeklyScheduleSeriesRequest:
      allOf:
        - $ref: '#/components/schemas/ScheduleSeriesRequest'
        - type: object
          required:
            - startDate
            - endDate
            - summaries
          properties:
            startDate:
              type: string
              format: date
              description: Start date for this day of week schedule
            endDate:
              type: string
              format: date
              description: End date for this day of week schedule
            summaries:
              type: array
              description: List of Schedule summaries for this day of week schedule
              items:
                $ref: '#/components/schemas/Gathering_WeeklyScheduleSummary'
    DateScheduleSeriesRequest:
      allOf:
        - $ref: '#/components/schemas/ScheduleSeriesRequest'
        - type: object
          required:
            - summaries
          properties:
            summaries:
              type: array
              description: List of Date Schedule summaries
              items:
                $ref: '#/components/schemas/Gathering_DateScheduleSummary'
    Gathering:
      type: object
      required:
        - uuid
        - hostUuid
        - approveType
        - minCapacity
        - maxCapacity
        - genderRatioEnabled
        - minAge
        - maxAge
        - totalGuests
        - fee
        - discountEnabled
        - offline
        - place
        - category
        - subCategory
        - status
        - imageUrl
        - title
        - introduction
        - clickCount
        - startDateTime
      properties:
        uuid:
          type: string
          format: uuid
          description: UUID of the gathering
        hostUuid:
          type: string
          format: uuid
          description: UUID of the host. tmp property
        approveType:
          $ref: '#/components/schemas/Gathering_ApproveType'
        minCapacity:
          type: integer
          description: Minimum capacity of the gathering
        maxCapacity:
          type: integer
          description: Maximum capacity of the gathering
        genderRatioEnabled:
          type: boolean
          description: If host can set gender ratio for the gathering
        minAge:
          type: integer
          description: Minimum age of guests
        maxAge:
          type: integer
          description: Maximum age of guests
        maxMaleCount:
          type: integer
          description: Maximum number of male guests
        maxFemaleCount:
          type: integer
          description: Maximum number of female guests
        totalGuests:
          type: integer
          description: Total number of guests
        fee:
          type: integer
          description: Fee to join the gathering
        discountEnabled:
          type: boolean
          description: If host can set discount strategy for the gathering
        offline:
          type: boolean
          description: If the gathering is offline
        place:
          type: string
          description: Place where the gathering will be held
        category:
          $ref: '#/components/schemas/Gathering_Category'
        subCategory:
          $ref: '#/components/schemas/Gathering_SubCategory'
        status:
          $ref: '#/components/schemas/Gathering_Status'
        imageUrl:
          type: string
          description: URL of the gathering image
        title:
          type: string
          description: Title of the gathering
        introduction:
          type: string
          description: Introduction of the gathering
        clickCount:
          type: integer
          description: Number of clicks on the gathering
        startDateTime:
          type: string
          format: date-time
          description: Start date and time of the gathering
        duration:
          type: number
          format: float
          description: Duration of the gathering in hours (can contain decimals)
    ScrollFilteredGatheringsResponse:
      type: object
      required:
        - hasNext
        - gatherings
        - cursor
      properties:
        cursor:
          type: object
          properties:
            score:
              type: integer
            uuid:
              type: string
              format: uuid
        hasNext:
          type: boolean
        gatherings:
          type: array
          items:
            $ref: '#/components/schemas/Gathering'
    JoinGatheringRequest:
      type: object
      required:
        - userUuid
      properties:
        userUuid:
          type: string
          format: uuid
          description: UUID of the user who wants to join the gathering
        confirmPaymentRequest:
          $ref: '#/components/schemas/ConfirmPaymentRequest'
    PreparePaymentRequest:
      type: object
      required:
        - productType
        - productUuid
        - productName
        - amount
        - buyerUuid
        - buyerEmail
        - buyerName
        - buyerPhone
      properties:
        productType:
          $ref: '#/components/schemas/ProductType'
        productUuid:
          type: string
          format: uuid
          description: UUID of the product being purchased
        productName:
          type: string
          description: Name of the product being purchased
        amount:
          type: integer
          description: Total amount for the payment in Won(KRW)
        buyerUuid:
          type: string
          format: uuid
          description: UUID of the buyer
        buyerEmail:
          type: string
          format: email
          description: Email address of the buyer
        buyerName:
          type: string
          description: Name of the buyer
        buyerPhone:
          type: string
          description: Phone number of the buyer
    PreparePaymentResponse:
      type: object
      required:
        - paymentId
        - storeId
        - channelKey
      properties:
        paymentId:
          type: string
          description: Unique identifier for the payment. It is generated by front app.
        storeId:
          type: string
          description: Identifier for the store where the payment is being processed.
        channelKey:
          type: string
          description: Key representing the payment channel used.
    PaymentWebhook:
      type: object
      required:
        - type
        - timestamp
        - data
      properties:
        type:
          $ref: '#/components/schemas/WebhookType'
        timestamp:
          type: string
          format: date-time
          description: Unix timestamp when the webhook event was generated
        data:
          $ref: '#/components/schemas/WebhookData'
    Gathering_Status:
      type: string
      enum:
        - OPEN_PENDING
        - OPEN
        - CLOSED
        - IN_PROGRESS
        - FINISHED
      description: Status of the gathering
    Gathering_Category:
      type: string
      enum:
        - PARTY
        - FOOD_DRINK
        - STUDY
        - INVEST
        - LANGUAGE
        - ACTIVITY
        - CULTURE
        - LOVE
      description: Category of the gathering
    Gathering_DayOfWeek:
      type: string
      enum:
        - SUNDAY
        - MONDAY
        - TUESDAY
        - WEDNESDAY
        - THURSDAY
        - FRIDAY
        - SATURDAY
      description: Day of the week
    Gathering_ApproveType:
      type: string
      enum:
        - FIRST_IN
        - APPROVAL
      description: Ways how to approve guests to join the gathering
    Gathering_SubCategory:
      type: string
      enum:
        - HOME_PARTY
      description: Sub-category of the gathering
    Gathering_WeeklyScheduleSummary:
      type: object
      required:
        - startDayOfWeek
        - startTime
      properties:
        startDayOfWeek:
          $ref: '#/components/schemas/Gathering_DayOfWeek'
        startTime:
          type: string
          format: time
          description: Start time of the gathering on the specified day of week
        duration:
          type: number
          format: float
          description: Duration in hours (can contain decimals)
    Gathering_DateScheduleSummary:
      type: object
      required:
        - startDate
        - startTime
        - duration
      properties:
        startDate:
          type: string
          format: date
          description: Start date of the gathering
        startTime:
          type: string
          format: time
          description: Start time of the gathering on the specified date
        duration:
          type: number
          format: float
          description: Duration in hours (can contain decimals)
    Gathering_ScheduleType:
      type: string
      enum:
        - WEEKLY
        - DATE
      description: Type of scheduling for the gatherings
    ConfirmPaymentRequest:
      type: object
      required:
        - paymentId
        - paymentToken
        - txId
        - amount
      properties:
        paymentId:
          type: string
          description: Unique identifier for the payment. It is generated by front app.
        paymentToken:
          type: string
          description: Token received from the payment gateway to verify the payment
        txId:
          type: string
          description: Transaction ID provided by the payment gateway
        amount:
          type: integer
          description: Amount to be payed in Won(KRW)
    ProductType:
      type: string
      enum:
        - GATHERING
      description: Type of the product
    WebhookType:
      type: string
      enum:
        - Transaction.Ready
        - Transaction.Paid
        - Transaction.VirtualAccountIssued
        - Transaction.PartialCancelled
        - Transaction.Cancelled
        - Transaction.Failed
        - Transaction.PayPending
        - Transaction.CancelPending
        - Transaction.DisputeCreated
        - Transaction.DisputeResolved
      description: Type of the payment webhook event
    WebhookData:
      type: object
      required:
        - storeId
        - paymentId
        - transactionId
      properties:
        storeId:
          type: string
          description: Identifier for the store or merchant
        paymentId:
          type: string
          description: Unique identifier for the payment
        transactionId:
          type: string
          description: Unique identifier for the transaction
        cancellationId:
          type: string
          description: Unique identifier for the cancellation
