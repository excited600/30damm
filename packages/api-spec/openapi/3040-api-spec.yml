openapi: 3.0.3
info:
  title: 3040 API
  description: |
    3040 서비스의 API 명세서입니다.
  version: 1.0.0
  contact:
    name: developer - xi600
    email: excited600@gmail.com
servers:
  - url: http://localhost:8080
    description: 로컬 서버
tags:
  - name: Gatherings
    description: 모임
  - name: Users
    description: 사용자
paths:
  /gatherings:
    post:
      operationId: openGathering
      tags:
        - Gatherings
      summary: Open a new gathering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenGatheringRequest'
      responses:
        '201':
          description: Gathering open successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenGatheringResponse'
  /gatherings/schedules:
    post:
      operationId: scheduleSeries
      tags:
        - Gatherings
      summary: Schedule gatherings based on host setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleSeriesRequest'
      responses:
        '201':
          description: Gatherings scheduled successfully
components:
  schemas:
    OpenGatheringRequest:
      type: object
      required:
        - hostUuid
        - approveType
        - minCapacity
        - maxCapacity
        - genderRatioEnabled
        - minAge
        - maxAge
        - fee
        - discountEnabled
        - offline
        - place
        - category
        - subCategory
        - imageUrl
        - title
        - introduction
        - startDateTime
      properties:
        hostUuid:
          type: string
          format: uuid
          description: UUID of the host. tmp property
        approveType:
          $ref: '#/components/schemas/Gathering_ApproveType'
        minCapacity:
          type: integer
          description: Minimum capacity of the gathering
        maxCapacity:
          type: integer
          description: Maximum capacity of the gathering
        maxMaleCount:
          type: integer
          description: Maximum number of male guests
        maxFemaleCount:
          type: integer
          description: Maximum number of female guests
        genderRatioEnabled:
          type: boolean
          description: If host can set gender ratio for the gathering
        minAge:
          type: integer
          description: Minimum age of guests
        maxAge:
          type: integer
          description: Maximum age of guests
        fee:
          type: integer
          description: Fee to join the gathering
        discountEnabled:
          type: boolean
          description: If host can set discount strategy for the gathering
        offline:
          type: boolean
          description: If the gathering is offline
        place:
          type: string
          description: Place where the gathering will be held
        category:
          $ref: '#/components/schemas/Gathering_Category'
        subCategory:
          $ref: '#/components/schemas/Gathering_SubCategory'
        imageUrl:
          type: string
          description: URL of the gathering image
        title:
          type: string
          description: Title of the gathering
        introduction:
          type: string
          description: Introduction of the gathering
        startDateTime:
          type: string
          format: date-time
          description: Start date and time of the gathering
        duration:
          type: number
          format: float
          description: Duration of the gathering in hours (can contain decimals)
    OpenGatheringResponse:
      type: object
      required:
        - uuid
        - hostUuid
        - approveType
        - minCapacity
        - maxCapacity
        - genderRatioEnabled
        - minAge
        - maxAge
        - totalGuests
        - fee
        - discountEnabled
        - offline
        - place
        - category
        - subCategory
        - status
        - imageUrl
        - title
        - introduction
        - clickCount
        - startDateTime
      properties:
        uuid:
          type: string
          format: uuid
          description: UUID of the gathering
        hostUuid:
          type: string
          format: uuid
          description: UUID of the host. tmp property
        approveType:
          $ref: '#/components/schemas/Gathering_ApproveType'
        minCapacity:
          type: integer
          description: Minimum capacity of the gathering
        maxCapacity:
          type: integer
          description: Maximum capacity of the gathering
        genderRatioEnabled:
          type: boolean
          description: If host can set gender ratio for the gathering
        minAge:
          type: integer
          description: Minimum age of guests
        maxAge:
          type: integer
          description: Maximum age of guests
        maxMaleCount:
          type: integer
          description: Maximum number of male guests
        maxFemaleCount:
          type: integer
          description: Maximum number of female guests
        totalGuests:
          type: integer
          description: Total number of guests
        fee:
          type: integer
          description: Fee to join the gathering
        discountEnabled:
          type: boolean
          description: If host can set discount strategy for the gathering
        offline:
          type: boolean
          description: If the gathering is offline
        place:
          type: string
          description: Place where the gathering will be held
        category:
          $ref: '#/components/schemas/Gathering_Category'
        subCategory:
          $ref: '#/components/schemas/Gathering_SubCategory'
        status:
          $ref: '#/components/schemas/Gathering_Status'
        imageUrl:
          type: string
          description: URL of the gathering image
        title:
          type: string
          description: Title of the gathering
        introduction:
          type: string
          description: Introduction of the gathering
        clickCount:
          type: integer
          description: Number of clicks on the gathering
        startDateTime:
          type: string
          format: date-time
          description: Start date and time of the gathering
        duration:
          type: number
          format: float
          description: Duration of the gathering in hours (can contain decimals)
    ScheduleSeriesRequest:
      type: object
      required:
        - scheduleType
        - hostUuid
        - approveType
        - minCapacity
        - maxCapacity
        - genderRatioEnabled
        - minAge
        - maxAge
        - discountEnabled
        - offline
        - place
        - fee
        - category
        - subCategory
        - imageUrl
        - title
        - introduction
      properties:
        scheduleType:
          $ref: '#/components/schemas/Gathering_ScheduleType'
        hostUuid:
          type: string
          format: uuid
          description: UUID of the host. tmp property
        approveType:
          $ref: '#/components/schemas/Gathering_ApproveType'
        minCapacity:
          type: integer
          description: Minimum capacity of the gathering
        maxCapacity:
          type: integer
          description: Maximum capacity of the gathering
        maxMaleCount:
          type: integer
          description: Maximum number of male guests
        maxFemaleCount:
          type: integer
          description: Maximum number of female guests
        genderRatioEnabled:
          type: boolean
          description: If host can set gender ratio for the gathering
        minAge:
          type: integer
          description: Minimum age of guests
        maxAge:
          type: integer
          description: Maximum age of guests
        fee:
          type: integer
          description: Fee to join the gathering
        discountEnabled:
          type: boolean
          description: If host can set discount strategy for the gathering
        offline:
          type: boolean
          description: If the gathering is offline
        place:
          type: string
          description: Place where the gathering will be held
        category:
          $ref: '#/components/schemas/Gathering_Category'
        subCategory:
          $ref: '#/components/schemas/Gathering_SubCategory'
        imageUrl:
          type: string
          description: URL of the gathering image
        title:
          type: string
          description: Title of the gathering
        introduction:
          type: string
          description: Introduction of the gathering
      discriminator:
        propertyName: scheduleType
        mapping:
          WEEKLY: '#/components/schemas/WeeklyScheduleSeriesRequest'
          DATE: '#/components/schemas/DateScheduleSeriesRequest'
    WeeklyScheduleSeriesRequest:
      allOf:
        - $ref: '#/components/schemas/ScheduleSeriesRequest'
        - type: object
          required:
            - startDate
            - endDate
            - summaries
          properties:
            startDate:
              type: string
              format: date
              description: Start date for this day of week schedule
            endDate:
              type: string
              format: date
              description: End date for this day of week schedule
            summaries:
              type: array
              description: List of Schedule summaries for this day of week schedule
              items:
                $ref: '#/components/schemas/Gathering_WeeklyScheduleSummary'
    DateScheduleSeriesRequest:
      allOf:
        - $ref: '#/components/schemas/ScheduleSeriesRequest'
        - type: object
          required:
            - summaries
          properties:
            summaries:
              type: array
              description: List of Date Schedule summaries
              items:
                $ref: '#/components/schemas/Gathering_DateScheduleSummary'
    Gathering_ApproveType:
      type: string
      enum:
        - FIRST_IN
        - APPROVAL
      description: Ways how to approve guests to join the gathering
    Gathering_Category:
      type: string
      enum:
        - PARTY
        - FOOD_DRINK
        - STUDY
        - INVEST
        - LANGUAGE
        - ACTIVITY
        - CULTURE
        - LOVE
      description: Category of the gathering
    Gathering_SubCategory:
      type: string
      enum:
        - HOME_PARTY
      description: Sub-category of the gathering
    Gathering_Status:
      type: string
      enum:
        - OPEN
        - CLOSED
        - IN_PROGRESS
        - COMPLETED
      description: Status of the gathering
    Gathering_DayOfWeek:
      type: string
      enum:
        - SUNDAY
        - MONDAY
        - TUESDAY
        - WEDNESDAY
        - THURSDAY
        - FRIDAY
        - SATURDAY
      description: Day of the week
    Gathering_WeeklyScheduleSummary:
      type: object
      required:
        - dayOfWeek
        - startTime
      properties:
        dayOfWeek:
          $ref: '#/components/schemas/Gathering_DayOfWeek'
        startTime:
          type: string
          format: time
          description: Start time of the gathering on the specified day of week
        duration:
          type: number
          format: float
          description: Duration in hours (can contain decimals)
    Gathering_DateScheduleSummary:
      type: object
      required:
        - date
        - startTime
        - duration
      properties:
        date:
          type: string
          format: date
          description: Date of the gathering
        startTime:
          type: string
          format: time
          description: Start time of the gathering on the specified date
        duration:
          type: number
          format: float
          description: Duration in hours (can contain decimals)
    Gathering_ScheduleType:
      type: string
      enum:
        - WEEKLY
        - DATE
      description: Type of scheduling for the gatherings
